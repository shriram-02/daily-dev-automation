name: Daily Developer Automation

on:
  schedule:
    - cron: '5 10 * * *'
    - cron: '45 11 * * *'
    - cron: '25 13 * * *'
    - cron: '5 15 * * *'
    - cron: '45 16 * * *'
    - cron: '25 18 * * *'
    - cron: '5 20 * * *'
    - cron: '45 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-dev-automation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  maintain:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Random safe delay
        run: sleep "$((RANDOM % 240))"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run lint
          npm test
          npm run build

      - name: Run automation
        env:
          DDA_DRY_RUN: 'false'
          DDA_LOCAL_MODE: 'false'
          DDA_TIMEZONE: ${{ vars.DDA_TIMEZONE || 'America/Indianapolis' }}
          DDA_MAX_COMMITS_PER_DAY: ${{ vars.DDA_MAX_COMMITS_PER_DAY || '8' }}
          DDA_MIN_MINUTES_BETWEEN_COMMITS: ${{ vars.DDA_MIN_MINUTES_BETWEEN_COMMITS || '90' }}
          DDA_QUIET_HOURS_START: ${{ vars.DDA_QUIET_HOURS_START || '22:00' }}
          DDA_QUIET_HOURS_END: ${{ vars.DDA_QUIET_HOURS_END || '06:00' }}
          DDA_ALLOWED_BRANCH: ${{ github.ref_name }}
          DDA_GIT_AUTHOR_NAME: ${{ vars.DDA_GIT_AUTHOR_NAME || 'Shriram Lahane' }}
          DDA_GIT_AUTHOR_EMAIL: ${{ vars.DDA_GIT_AUTHOR_EMAIL || 'lahaneshriram2@gmail.com' }}
        run: npm start
